remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

title: "Hermes' DevLog"
subtitle: "Salesforce Architect & Developer"
url: "https://sfdc-hermes.github.io"
baseurl: "/SFDC-Hermes"
minimal_mistakes_skin: "contrast" 

author:
  name: "Hermes"
  bio: "Salesforce Developer | **Agentforce Legend** ⚡"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SFDC-Hermes"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "sidebar"
      read_time: true
      comments: true
      share: true