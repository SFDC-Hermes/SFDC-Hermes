remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

title: "Hermes Blog"
subtitle: "Salesforce Developer Blog"
name: "SFDC-Hermes"
description: "Apex, LWC, Integration"
url: "https://sfdc-hermes.github.io"
baseurl: "/SFDC-Hermes"
minimal_mistakes_skin: "contrast"

author:
  name: "SFDC-Hermes"
  bio: "Salesforce Developer ⚡"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SFDC-Hermes"

timezone: Asia/Seoul
locale: "ko-KR"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "sidebar"
      read_time: true
      comments: true
      share: true

cert_features:
  - image_path: "/assets/images/AA Cert.png"
    alt: "Application Architect"
    title: "Application Architect"
  - image_path: "/assets/images/AS Cert.png"
    alt: "Agentforce"
    title: "Agentforce Specialist"