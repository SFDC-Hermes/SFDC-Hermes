remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

title: "Hermes Blog"
subtitle: "Salesforce 개발 블로그"
name: "SFDC-Hermes"
description: "Apex, LWC, Integration 팁과 노하우"
url: "https://SFDC-Hermes.github.io"
baseurl: "/Lightning-Hermes"

author:
  name: "SFDC-Hermes"
  bio: "Salesforce Developer ⚡"
  # 👇 이것들 추가하면 좋아요
  location: "Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/SFDC-Hermes"

timezone: Asia/Seoul
locale: "ko-KR"

# 👇 이것도 추가 권장
markdown: kramdown
highlighter: rouge

# 👇 검색 기능 추가
search: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
